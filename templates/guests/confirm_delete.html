{% extends "base.html" %}
{% block title %}Delete Guest{% endblock %}
{% block nav_guests %}active{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{% url 'guests:detail' guest.pk %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card shadow-sm" style="max-width:480px">
  <div class="card-body">
    <h5 class="card-title">Delete Guest</h5>
    <p>Are you sure you want to delete <strong>{{ guest }}</strong>? This cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'guests:detail' guest.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
