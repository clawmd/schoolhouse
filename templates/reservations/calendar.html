{% extends "base.html" %}
{% block title %}Reservation Calendar{% endblock %}
{% block nav_calendar %}active{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">Reservation Calendar</h5>
  <a href="{% url 'reservations:new' %}" class="btn btn-primary btn-sm"><i class="bi bi-plus"></i> New Reservation</a>
</div>
<div class="card shadow-sm">
  <div class="card-body">
    <div id="calendar"></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const events = {{ events_json|safe }};
document.addEventListener('DOMContentLoaded', function() {
  const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    events: events,
    eventClick: function(info) {
      if (info.event.url) { info.jsEvent.preventDefault(); window.location = info.event.url; }
    },
    height: 'auto',
  });
  cal.render();
});
</script>
{% endblock %}
