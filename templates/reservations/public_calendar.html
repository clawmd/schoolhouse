<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>26 Schoolhouse — Availability Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .page-header { background: #212529; color: #fff; padding: 1rem 1.5rem; }
  </style>
</head>
<body>
<div class="page-header">
  <h5 class="mb-0">26 Schoolhouse — Availability Calendar</h5>
</div>
<div class="container-fluid py-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <div id="calendar"></div>
    </div>
  </div>
  <p class="text-muted text-center mt-3" style="font-size:.8rem">
    Grey blocks indicate reserved dates. White dates are available.
  </p>
</div>
<script>
const events = {{ events_json|safe }};
document.addEventListener('DOMContentLoaded', function() {
  const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    events: events,
    headerToolbar: { left: 'prev', center: 'title', right: 'next' },
    height: 'auto',
    editable: false,
    selectable: false,
  });
  cal.render();
});
</script>
</body>
</html>
