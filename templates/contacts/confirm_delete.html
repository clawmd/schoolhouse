{% extends "base.html" %}
{% block title %}Delete Contact{% endblock %}
{% block nav_contacts %}active{% endblock %}

{% block content %}
<div class="mb-3">
  <a href="{% url 'contacts:list' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card shadow-sm" style="max-width:480px">
  <div class="card-body">
    <h5 class="card-title">Delete Contact</h5>
    <p>Delete <strong>{{ contact }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'contacts:list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
