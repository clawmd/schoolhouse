<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — 26 Schoolhouse RT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .login-card { max-width: 380px; margin: 120px auto; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="mb-1 fw-semibold">26 Schoolhouse RT</h4>
      <p class="text-muted mb-4" style="font-size:.875rem">Rental Management</p>
      {% if form.errors %}
      <div class="alert alert-danger py-2">Invalid username or password.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small">Username</label>
          <input type="text" name="username" class="form-control" autofocus autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label small">Password</label>
          <input type="password" name="password" class="form-control" autocomplete="current-password">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
